services:
  # 1. Backend Service (Python/FastAPI)
  - type: web
    name: supa-writer-backend
    env: python
    region: ohio # or your preferred region
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: SUPABASE_URL
        sync: false # Set this in the Render Dashboard
      - key: SUPABASE_KEY
        sync: false
      - key: RYNE_COOKIE
        sync: false
      - key: WRITEHUMAN_COOKIE
        sync: false

  # 2. Frontend Service (TypeScript/Vite)
  - type: static # static site for Vite SPA (serves built `dist` folder)
    name: supa-writer-frontend
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    publish: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: supa-writer-backend
          type: web
          property: host

    # Alternative: if you prefer a long-running Node process, change `type` to `web`
    # and set `startCommand: npm run preview -- --port $PORT` or add a `start` script
    # to frontend/package.json that runs a static server.